capabilities:
  # OBJECTIVE: what data the API returned on 2026-03-06. Not what should exist — what does.
  recordings:
    lines_with_count: 20
    lines_without_count: 15  # have calls but no recordings found in sample
    coverage_window: { earliest: "2024-10-10", latest: "2026-03-06" }
    total_sampled: 312  # out of 1430 calls (22%)
    note: >
      Partial coverage due to: (1) recording toggle was off on many lines until sysadmin
      bulk-fixed it early March 2026, (2) recordings may have existed since 2024 but could
      be inaccessible after account changes in Q2-Q3 2025.
  transcripts:
    requires: "recording"
    total_sampled: 308
    note: "Auto-generated for 99% of recorded calls. Business/Scale plan confirmed."
  summaries:
    requires: "recording"
    total_sampled: 291
    note: "AI-generated for 93% of recorded calls."
  sms:
    all_lines: true
    earliest: "2022-04-13"
  plan_tier: "Business or Scale (transcripts and summaries confirmed present)"
  external_data:
    ask_elephant: "Video meeting transcripts/recordings (separate plugin)"
    hubspot: "May have synced Quo call recordings as MP4/WAV. Overlap investigation needed."
    kixi: "Sales/SDR localized calling vendor. Data not in Quo."

reasoning_shortcuts:
  check_line_capabilities: >
    Before searching for recordings/transcripts, check the phone_lines table
    for that line's rec/trans value. If "none" or "no", skip the search.
  api_vs_workspace: >
    plan_restrictions = what the API supports per plan tier.
    capabilities = what data actually exists in THIS workspace.
    A feature can be API-supported but have no data if never enabled.
  pre_august_2025: >
    Before Aug 2025, only Outbound Notifications (2022), Ella Van Horn (2024-12),
    Phone Integration (2025-01), and Brixton Gardner (2025-03) lines existed.
    Most pre-2025 activity was SMS. Person-named lines were created in bulk Aug 2025.
  recording_toggle_gap: >
    Many lines had recording off until sysadmin bulk-fixed it in early March 2026.
    A line showing recordings starting March 2026 reflects the fix, not first-ever call.
    Historical recordings from 2024 may exist but be inaccessible due to account changes.
  bmoney_alias: >
    "B-Money's Old Phone" (PNAVNuXLWH) and "Brianna Davis (Formerly Maddi)" (PNqVRoqfnP)
    are the SAME person. Two inactive personal lines.
  scope_limitation: >
    This mental model records what data exists, not who people are or what they do.
    Roles and org structure change — infer from conversation/call context when needed.
    For customer-level queries, use conversations + calls API with participant number.

