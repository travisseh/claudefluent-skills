# Quo API Expertise
# Durable facts about the Quo (formerly OpenPhone) API.
# Updated via /quo:self-improve.

api:
  base_url: https://api.openphone.com/v1
  auth_header: Authorization  # raw API key, no Bearer prefix
  rate_limit: 10  # requests per second
  pagination: cursor  # pageToken/nextPageToken, max 100 per page
  total_items_reliable: false  # known bug since v1.1.2

id_prefixes:
  phone_number: "PN"
  call: "AC"
  message: "AC"  # same prefix as calls — distinguish by context/endpoint
  user: "US"
  recording: "CR"
  conversation: "CN"

cloudflare:
  user_agent_required: true  # default Python urllib agent is blocked (Error 1010)

plan_restrictions:
  all_plans:
    - call recordings
    - call metadata
    - messages (SMS text content, direction, status)
    - phone numbers
    - users
    - contacts
    - webhooks (calls, messages)
  business_and_scale:
    - call transcripts (speaker-labeled, time-coded)
    - call summaries (AI-generated)
  scale_only:
    - AI action items

recording:
  format: audio/mpeg  # MP3
  url_behavior: possibly_signed  # download promptly, may expire
  statuses: [absent, completed, deleted, failed, in-progress, paused, processing, stopped, stopping]

transcript:
  fields: [content, start, end, identifier, userId]
  identifier_is: phone_number  # E.164 format
  userId_is: workspace_user  # null for external callers
  statuses: [absent, in-progress, completed, failed]

calls_endpoint:
  participants_required: true  # E.164 array, limited to 1 item
  participants_encoding: "participants[]=+1..."  # array bracket syntax
  date_params_require_time: true  # must be full ISO 8601 datetime, not date-only

messages_endpoint:
  list:
    method: GET
    path: /v1/messages
    required_params: [phoneNumberId, participants, maxResults]
    optional_params: [userId, createdAfter, createdBefore, pageToken]
    participants_required: true  # same pattern as calls — E.164 array
    date_params_require_time: true  # full ISO 8601 datetime
  get_by_id:
    method: GET
    path: /v1/messages/{id}
  send:
    method: POST
    path: /v1/messages
    body: { content: "text (1-1600 chars)", from: "PN... or E.164", to: ["E.164"] }  # to limited to 1 recipient; response returns 202 not 200
    optional_body: [userId, setInboxStatus]
  object_fields: [id, to, from, text, phoneNumberId, direction, userId, status, createdAt, updatedAt]  # NB: send uses 'content' in request body, but response/list returns 'text'
  direction_values: [incoming, outgoing]
  status_values: [queued, sent, delivered, undelivered]
  id_prefix: "AC"  # same as calls — disambiguate by endpoint context

message_webhooks:
  create:
    method: POST
    path: /v1/webhooks/messages
    body: { events: ["message.received", "message.delivered"], url: "https://..." }
    optional_body: [label, resourceIds, status, userId]
  event_types: [message.received, message.delivered]

enumeration_order:
  steps:
    - list conversations (GET /v1/conversations) — discovers phoneNumberId + participants
    - list calls per conversation (GET /v1/calls?phoneNumberId=PNxxx&participants[]=+1...)
    - list messages per conversation (GET /v1/messages?phoneNumberId=PNxxx&participants[]=+1...)
    - fetch per-call data (recordings, transcript, summary)
  note: "Cannot list all calls/messages for a phone number without knowing participants. Use conversations endpoint first."

